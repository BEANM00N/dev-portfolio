<link rel="stylesheet" href="/css/render.css">
<script src="/js/render.js" defer></script>

<div style="margin-top: 1.5rem; margin-bottom: 2.5rem; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); height: 500px; width: 100%; background-color: #1e293b;">
  <div id="bp-render-{{ .Ordinal }}" style="width: 100%; height: 100%;"></div>
</div>

{{ $file_path := print .Page.File.Dir (.Get "src") }}
<textarea id="bp-data-{{ .Ordinal }}" style="display:none;">{{ readFile $file_path | safeHTML }}</textarea>

<script>
  window.addEventListener('load', () => {
    const bpText = document.getElementById('bp-data-{{ .Ordinal }}').value.trim();
    const container = document.getElementById('bp-render-{{ .Ordinal }}');
    
    if (window.blueprintUE && window.blueprintUE.render && window.blueprintUE.render.Main) {
      /* FIX: Passing "500px" stops the layout from collapsing to 0px, 
         and keeps your nodes at their perfect native scale! */
      const renderer = new window.blueprintUE.render.Main(bpText, container, { height: "500px" });
      renderer.start();
    } else {
      console.error("BlueprintUE failed to load!");
    }
  });
</script>
